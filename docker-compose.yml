services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: mediapp
      POSTGRES_PASSWORD: mediapp
      POSTGRES_DB: mediapp
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediapp -d mediapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./server
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://mediapp:mediapp@db:5432/mediapp
      HOST: 0.0.0.0
      PORT: 4000
      APP_URL: ${APP_URL:-http://localhost:5173}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      TRIAL_DAYS: ${TRIAL_DAYS:-7}
    restart: unless-stopped
    volumes:
      - ./server:/usr/src/app
      - api_node_modules:/usr/src/app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  db_data:
  api_node_modules:
